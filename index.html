<style>
  :root{
    --accent:#caaa44;
    --accent-soft:#f7efd4;
    --bg:#ffffff;
    --text:#1a1a1a;
    --muted:#6b6b6b;
    --line:#ececec;
    --card:#fcfbf7;
    --shadow:0 1px 2px rgba(0,0,0,.03),0 8px 24px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;

    -webkit-font-smoothing:antialiased;line-height:1.6;}

  a:hover{text-decoration:underline}
  .wrap{max-width:1080px;margin:0 auto;padding:48px 24px 96px;position:relative}

  .profile-banner{
    position:absolute;top:24px;right:24px;
    display:inline-flex;align-items:center;gap:10px;
    background:#fcf8ec;border:1px solid #f1e6c2;
    padding:8px 16px 8px 8px;border-radius:999px;
    text-decoration:none;color:var(--text);
    transition:transform .15s,box-shadow .15s,border-color .15s;
    box-shadow:0 1px 2px rgba(0,0,0,.02);
  }
  .profile-banner:hover{
    transform:translateY(-1px);border-color:var(--accent);
    box-shadow:0 6px 16px rgba(202,170,68,.18);text-decoration:none
  }
  .profile-banner .avatar{
    width:38px;height:38px;border-radius:50%;background:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;border:1px solid #f0e5c0;overflow:hidden
  }
  .profile-banner .p-text{display:flex;flex-direction:column;line-height:1.2}
  .profile-banner .p-name{font-weight:700;font-size:14px;color:var(--text)}
  .profile-banner .p-sub{font-size:12px;color:var(--accent);font-weight:600;margin-top:2px}

  @media (max-width:640px){
    .profile-banner{position:static;margin:0 auto 16px;display:flex;width:fit-content}
  }

  header{text-align:center;padding:32px 0 12px}
  .eyebrow{font-size:13px;letter-spacing:.18em;color:var(--accent);font-weight:600;text-transform:uppercase}
  h1{font-size:40px;margin:10px 0 8px;font-weight:700;letter-spacing:-.02em}
  h1 .dot{color:var(--accent)}
  .sub{color:var(--muted);font-size:15px;margin:0 auto;max-width:640px;font-weight:400}
  .cta{display:inline-flex;align-items:center;gap:10px;margin-top:20px;
    background:#111;color:#fff;text-decoration:none;
    padding:12px 22px;border-radius:999px;font-weight:600;font-size:14.5px;
    box-shadow:0 4px 14px rgba(0,0,0,.22);
    transition:transform .15s,box-shadow .15s,background .15s}
  .cta:hover{background:#000;transform:translateY(-1px);
    box-shadow:0 6px 18px rgba(0,0,0,.3);text-decoration:none}
  .cta .gift{display:inline-flex;align-items:center;justify-content:center;
    width:22px;height:22px;border-radius:50%;background:rgba(202,170,68,.22);
    font-size:12px;font-weight:700}
  .cta .brand{color:var(--accent);font-weight:700}
  .cta .sep{color:#555}
  .cta .desc{color:#fff}
  .cta .arrow{font-weight:700;transition:transform .15s;color:var(--accent)}
  .cta:hover .arrow{transform:translateX(3px)}

  .search{margin:36px auto 20px;max-width:620px;position:relative}
  .search input{
    width:100%;padding:16px 48px 16px 20px;border:1.5px solid var(--line);
    border-radius:14px;font-size:16px;font-family:inherit;outline:none;
    background:#fff;transition:border-color .15s, box-shadow .15s;
  }
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .search::after{content:"⌕";position:absolute;right:18px;top:50%;transform:translateY(-50%);
    color:var(--muted);font-size:22px;pointer-events:none}

  .stat{text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px}
  .stat b{color:var(--accent)}

  .alpha{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;
    padding:10px;margin:0 auto 28px;max-width:860px;
    border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .alpha button{
    border:0;background:transparent;padding:6px 10px;border-radius:8px;
    font-family:inherit;font-weight:600;font-size:13px;color:var(--muted);cursor:pointer;
    transition:background .12s,color .12s;min-width:32px;
  }
  .alpha button:hover{background:var(--accent-soft);color:var(--accent)}
  .alpha button.active{background:var(--accent);color:#fff}
  .alpha button.disabled{opacity:.25;cursor:default}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:18px 20px;transition:transform .12s,box-shadow .12s,border-color .12s;
  }
  .card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--accent)}
  .term{font-size:17px;font-weight:700;color:var(--text);margin:0 0 2px;letter-spacing:-.01em}
  .ko{font-size:14px;color:var(--accent);font-weight:600;margin-bottom:8px}
  .def{font-size:14px;color:#3a3a3a;margin:0;font-weight:400;line-height:1.65}

  .section-head{
    grid-column:1/-1;font-size:28px;font-weight:700;color:var(--accent);
    padding:18px 4px 4px;margin-top:12px;border-bottom:2px solid var(--accent-soft)
  }
  .empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}

  footer{margin-top:72px;text-align:center;color:var(--muted);font-size:13px;
    padding-top:28px;border-top:1px solid var(--line)}
  footer a{color:var(--muted);border-bottom:1px dashed var(--accent)}

  @media (max-width:640px){
    .wrap{padding:28px 16px 72px}
    h1{font-size:30px}
    .grid{grid-template-columns:1fr}
  }

  mark{background:var(--accent-soft);color:var(--text);padding:0 2px;border-radius:3px}
</style>
</head>

<script>
const DATA = [
["Ablation","애블레이션(구성요소 제거 실험)","모델 일부 구성요소를 제거·제외한 뒤 재학습해 성능 변화를 관찰하며 해당 요소의 중요도를 평가하는 기법."],
["Abductive Logic Programming (ALP)","귀추적 논리 프로그래밍","불완전하게 정의된 술어에 대해 귀추 추론으로 문제를 해결하는 고수준 지식 표현 프레임워크."],
["Abductive Reasoning","귀추 추론","관찰된 사실로부터 가장 단순하고 그럴듯한 설명을 찾는 논리적 추론 방식."],
["Abstraction","추상화","대상에서 물리·공간·시간적 세부를 제거하고 관심 있는 속성에만 집중하는 과정."],
["Accept/Reject","수락/거절","AI가 제안한 코드 변경을 개발자가 선택적으로 승인 또는 거부해 품질을 유지하는 바이브 코딩 UI 기능."],
["Activation Functions","활성화 함수","ReLU·시그모이드·tanh 등 신경망이 입력과 레이블 간 비선형 관계를 학습하도록 돕는 수학 함수."],
["Active Learning","능동 학습","라벨링 비용이 클 때 모델이 학습에 유리한 데이터를 스스로 선택해 요청하는 학습 방식."],
["AdaGrad","아다그라드","파라미터별로 기울기를 재조정해 각기 다른 학습률을 적용하는 정교한 경사하강법 알고리즘."],
["Agent","에이전트","강화학습에서 정책에 따라 기대 보상을 극대화하는 주체. 최신 AI에서는 멀티모달 입력을 추론하는 소프트웨어를 뜻함."],
["Agent Mode","에이전트 모드","Cursor·Windsurf 등에서 AI가 전체 코드베이스를 능동적으로 탐색·이해해 맥락 기반 지원을 제공하는 고급 기능."],
["Agentic AI","에이전틱 AI","제한된 인간 감독 아래 목표를 스스로 분해·수행하며 결과에 따라 전략을 조정하는 자율형 AI 시스템."],
["Agentic Workflow","에이전틱 워크플로","에이전트가 목표 달성을 위해 자율적으로 계획·실행·자기 교정을 반복하는 동적 작업 흐름."],
["AI Observability","AI 관찰가능성","AI 시스템의 행동·출력·의사결정 과정을 모니터링하고 추적할 수 있는 역량."],
["AI Slop","AI 슬롭","품질보다 양을 우선해 저렴하게 대량 생산된 생성형 AI 결과물."],
["Alignment","얼라인먼트(정렬)","AI의 목표가 개발자의 의도와 일치해 안전하고 이로운 방향으로 작동하도록 맞추는 개념."],
["AlphaGo","알파고","Google DeepMind가 개발한 바둑 AI로, 인간 프로 기사를 최초로 이긴 컴퓨터 프로그램."],
["ANFIS","ANFIS(적응형 뉴로-퍼지 시스템)","신경망과 퍼지 논리를 결합해 두 방식의 장점을 모두 활용하는 인공 신경망."],
["Anomaly Detection","이상 탐지","정상 패턴에서 크게 벗어난 데이터 포인트나 비정상 패턴을 식별하는 과정."],
["Anthropomorphism","의인화","AI 등 비인간 개체에 인간의 특성·감정을 부여하는 사고 경향."],
["API","API(응용 프로그램 인터페이스)","소프트웨어 간 상호작용 방식을 정의한 프로토콜·도구 모음. AI 도구 통합의 핵심."],
["Approximation Error","근사 오차","머신러닝 모델의 근삿값과 실제 값 사이의 차이."],
["Artificial General Intelligence (AGI)","범용 인공지능(AGI)","다양한 과제에서 인간 수준 이상의 인지 능력과 창의성을 발휘하는 AI."],
["Artificial Intelligence (AI)","인공지능(AI)","기계가 보여주는 지능으로, 인간·동물의 자연 지능과 대비되는 개념."],
["Artificial Neural Network","인공 신경망","계층으로 연결된 노드들로 뇌 구조를 모방해 정보를 처리하는 컴퓨터 시스템."],
["Attention Mechanism","어텐션 메커니즘","입력 내 특정 토큰의 중요도를 가중해 트랜스포머가 다음 토큰을 예측하도록 돕는 메커니즘."],
["Attribute","속성(attribute)","색상·크기처럼 관측값을 기술하는 특성. 머신러닝의 특성(feature)과 동의어."],
["Auto-Encoder","오토인코더","인코더·디코더로 구성해 압축을 통해 주요 정보를 추출하도록 학습하는 신경망."],
["Automated Machine Learning (AutoML)","오토ML","하이퍼파라미터 튜닝·특성 공학·배포까지 ML 모델 제작을 자동화하는 접근."],
["Autonomous Agents","자율 에이전트","독립적으로 목표를 추구하고 환경과 상호작용하며 의사결정을 내리는 AI."],
["Autoregressive Model","자기회귀 모델","자기가 이전에 낸 예측을 입력으로 다음 값을 예측하는 모델. 트랜스포머 기반 LLM이 대표적."],
["AUC","AUC","이진 분류 모델이 양성·음성 클래스를 얼마나 잘 분리하는지 나타내는 0~1 사이 지표."],
["Backpropagation","역전파","신경망에서 오차 기울기를 출력층에서 입력층 방향으로 전파해 가중치를 갱신하는 알고리즘."],
["Bagging","배깅","데이터의 무작위 부분집합으로 여러 모델을 학습시켜 안정성·정확도를 높이는 앙상블 기법."],
["Bag-of-Words Model","단어 주머니 모델","문법·어순은 무시하고 단어 출현 빈도만 유지해 텍스트를 표현하는 NLP 기법."],
["Baseline","베이스라인","다른 모델 성능을 비교할 기준이 되는 참조 모델."],
["Base Model","베이스 모델","파인튜닝의 출발점이 되는 사전학습 모델."],
["Batch","배치","한 번의 학습 반복에 사용되는 예제 묶음."],
["Batch Inference","배치 추론","다수의 비라벨 예제를 소규모 묶음으로 나눠 가속기의 병렬성을 활용해 예측하는 방식."],
["Batch Normalization","배치 정규화","은닉층 활성화 입력·출력을 정규화해 학습을 안정화하고 과적합을 줄이는 기법."],
["Batch Size","배치 크기","한 번의 학습 반복에 처리하는 예제 수. 보통 1부터 수천까지 조절 가능."],
["Bayesian Neural Network","베이지안 신경망","가중치와 출력의 불확실성을 확률 분포로 표현하는 신경망."],
["Bayesian Optimization","베이지안 최적화","불확실성을 수량화한 대체 모델을 이용해 계산 비용이 큰 목적 함수를 최적화하는 기법."],
["Behavior Tree","행동 트리","유한한 과제 집합 간 전환을 모듈식으로 표현하는 계획 실행 모델."],
["Bellman Equation","벨만 방정식","강화학습에서 최적 Q 함수가 만족하는 항등식으로 Q-러닝의 기반."],
["BERT","BERT","양방향 문맥을 활용해 텍스트를 표현하는 트랜스포머·셀프 어텐션 기반 모델."],
["Bias (Ethics/Fairness)","편향(윤리/공정성)","특정 집단에 대한 고정관념·편견·편애. 데이터 수집과 시스템 설계 전반에 영향."],
["Bias (Math)","편향(수학)","모델이 원점을 지나지 않는 패턴도 학습할 수 있게 해 주는 절편/오프셋."],
["Bidirectional Language Model","양방향 언어 모델","앞뒤 문맥을 모두 보고 토큰 확률을 추정하는 언어 모델."],
["Binary Classification","이진 분류","스팸/비스팸처럼 상호 배타적인 두 클래스 중 하나를 예측하는 과제."],
["Binary Condition","이진 조건","예·아니오처럼 결과가 두 가지뿐인 결정 트리 조건."],
["Binning","비닝(구간화)","연속형 특성을 여러 구간의 이진 특성으로 변환해 학습에 쓰는 기법."],
["Black Box Model","블랙박스 모델","내부 추론 과정을 인간이 이해하기 어려운 해석 불가능 모델."],

const grid = document.getElementById('grid');
const q = document.getElementById('q');
const stat = document.getElementById('stat');
const alpha = document.getElementById('alpha');

const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let activeLetter = "ALL";

const termLetters = new Set(DATA.map(d => d[0][0].toUpperCase()));

function buildAlpha(){
  const all = document.createElement('button');
  all.textContent = 'ALL'; all.dataset.l='ALL';
  all.classList.add('active');
  alpha.appendChild(all);
  LETTERS.forEach(L=>{
    const b = document.createElement('button');
    b.textContent = L; b.dataset.l = L;
    if(!termLetters.has(L)) b.classList.add('disabled');
    alpha.appendChild(b);
  });
  alpha.addEventListener('click', e=>{
    const btn = e.target.closest('button');
    if(!btn || btn.classList.contains('disabled')) return;
    activeLetter = btn.dataset.l;
    [...alpha.children].forEach(c=>c.classList.toggle('active', c===btn));
    render();
  });
}

function escapeHTML(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function highlight(s, kw){
  if(!kw) return escapeHTML(s);
  const re = new RegExp('('+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return escapeHTML(s).replace(re,'<mark>$1</mark>');
}

function render(){
  const kw = q.value.trim();
  const lower = kw.toLowerCase();
  const filtered = DATA.filter(([t,k,d])=>{
    if(activeLetter!=='ALL' && t[0].toUpperCase()!==activeLetter) return false;
    if(!kw) return true;
    return t.toLowerCase().includes(lower) || k.toLowerCase().includes(lower) || d.toLowerCase().includes(lower);
  });

  stat.innerHTML = `전체 <b>${DATA.length}</b>개 용어 중 <b>${filtered.length}</b>개 표시`;

  if(!filtered.length){
    grid.innerHTML = `<div class="empty">검색 결과가 없어요. 다른 키워드로 시도해 보세요.</div>`;
    return;
  }

  let html = '';
  let lastL = '';
  filtered.forEach(([t,k,d])=>{
    const L = t[0].toUpperCase();
    if(L !== lastL){
      html += `<h2 class="section-head" id="sec-${L}">${L}</h2>`;
      lastL = L;
    }
    html += `<article class="card">
      <h3 class="term">${highlight(t,kw)}</h3>
      <div class="ko">${highlight(k,kw)}</div>
      <p class="def">${highlight(d,kw)}</p>
    </article>`;
  });
  grid.innerHTML = html;
}

let t;
q.addEventListener('input', ()=>{ clearTimeout(t); t=setTimeout(render,120); });

buildAlpha();
render();
</script>
